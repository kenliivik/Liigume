<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskBreak | Stretch Timer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <main id="app-container" class="app-shell">

        <header class="app-header">
            <div class="app-header-top">
                <h1 class="app-title">
                    <i data-lucide="coffee" class="icon-brand"></i> DeskBreak
                </h1>
                <span id="progress-text" class="progress-label">
                    Exercise 1 of 10
                </span>
            </div>
            <div id="progress-bar" class="progress-bar"></div>
        </header>

        <div id="active-view" class="stage transition-smooth">

            <div class="stage-header">
                <h2 id="exercise-name" class="exercise-name">
                    Neck & Shoulder Release
                </h2>

                <div class="exercise-visual" id="icon-container">
                    <img id="exercise-image" src="" alt="" class="exercise-image" onerror="handleImageError(this)">
                    <div id="image-fallback" class="exercise-image-fallback hidden">
                        <i data-lucide="image-off" class="icon-lg"></i>
                        <span id="image-fallback-path" class="fallback-path"></span>
                    </div>
                </div>
            </div>

            <div class="timer-wrap">
                <div id="timer-display" class="timer-display">00:45</div>
            </div>

            <div class="controls">
                <button onclick="resetCurrent()" class="btn btn-ghost" title="Reset Timer">
                    <i data-lucide="rotate-ccw" class="icon-sm"></i>
                </button>

                <button id="play-pause-btn" onclick="togglePlayPause()" class="btn btn-primary">
                    <i id="play-icon" data-lucide="play" class="icon-lg"></i>
                    <i id="pause-icon" data-lucide="pause" class="icon-lg pause hidden"></i>
                </button>

                <button onclick="skipExercise()" class="btn btn-ghost" title="Skip">
                    <i data-lucide="skip-forward" class="icon-sm"></i>
                </button>
            </div>
        </div>

        <footer id="up-next-section" class="next-up transition-smooth">
            <div class="next-up-card">
                <div class="next-up-left">
                    <div class="next-up-icon-wrap">
                        <i data-lucide="arrow-right" class="icon-sm" style="color: var(--slate-400);"></i>
                    </div>
                    <div>
                        <p class="next-up-label">Up Next</p>
                        <p id="next-exercise-name" class="next-up-name">Hands-Behind-Back Chest Opener</p>
                    </div>
                </div>
                <span id="next-exercise-time" class="next-up-time">0:45</span>
            </div>
        </footer>

        <div id="complete-view" class="complete hidden transition-smooth">
            <div class="complete-icon-wrap">
                <i data-lucide="check-circle-2" class="icon-xl text-brand"></i>
            </div>
            <div>
                <h2 class="complete-title">Session Complete!</h2>
                <p class="complete-text">Great job taking a break. Go grab some water and enjoy the rest of your day.</p>
            </div>
            <button onclick="restartSession()" class="btn btn-restart">
                <i data-lucide="rotate-ccw" class="icon-md"></i> Restart Routine
            </button>
        </div>

    </main>

    <script>
        // Updated 10-Step Exercise Data
        // Images are numbered 1-11 (exercise 1 uses two images: 1 and 2,
        // switching automatically at the halfway point of its timer).
        const exercises = [
            { name: "Neck & Shoulder Release", duration: 45, images: ["images/1.png", "images/2.png"] },
            { name: "Hands-Behind-Back Chest Opener", duration: 45, images: ["images/3.png"] },
            { name: "Seated Spinal Twist (Right Side)", duration: 30, images: ["images/4.png"] },
            { name: "Seated Spinal Twist (Left Side)", duration: 30, images: ["images/5.png"] },
            { name: "Seated Pigeon Stretch (Right Leg)", duration: 30, images: ["images/6.png"] },
            { name: "Seated Pigeon Stretch (Left Leg)", duration: 30, images: ["images/7.png"] },
            { name: "Wrist Extensions (Right Arm)", duration: 20, images: ["images/8.png"] },
            { name: "Wrist Extensions (Left Arm)", duration: 20, images: ["images/9.png"] },
            { name: "Standing Hamstring Reach (Right Leg)", duration: 30, images: ["images/10.png"] },
            { name: "Standing Hamstring Reach (Left Leg)", duration: 30, images: ["images/11.png"] }
        ];

        // State Variables
        let currentIndex = 0;
        let timeLeft = exercises[currentIndex].duration;
        let isPlaying = false;
        let timerInterval = null;
        let currentImageIndex = 0; // which image (0 or 1) is currently shown for this exercise

        // DOM Elements
        const DOM = {
            progressText: document.getElementById('progress-text'),
            progressBar: document.getElementById('progress-bar'),
            activeView: document.getElementById('active-view'),
            completeView: document.getElementById('complete-view'),
            upNextSection: document.getElementById('up-next-section'),
            exerciseName: document.getElementById('exercise-name'),
            iconContainer: document.getElementById('icon-container'),
            exerciseImage: document.getElementById('exercise-image'),
            imageFallback: document.getElementById('image-fallback'),
            imageFallbackPath: document.getElementById('image-fallback-path'),
            timerDisplay: document.getElementById('timer-display'),
            playIcon: document.getElementById('play-icon'),
            pauseIcon: document.getElementById('pause-icon'),
            nextName: document.getElementById('next-exercise-name'),
            nextTime: document.getElementById('next-exercise-time')
        };

        // Initialize App
        function init() {
            renderSegments();
            updateUI();
            lucide.createIcons();
        }

        // Render Progress Bar Segments
        function renderSegments() {
            DOM.progressBar.innerHTML = '';
            exercises.forEach((_, index) => {
                const segment = document.createElement('div');
                segment.className = `progress-segment ${
                    index < currentIndex ? 'is-done' :
                    index === currentIndex ? 'is-current' : ''
                }`;
                DOM.progressBar.appendChild(segment);
            });
        }

        // Format Seconds to MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Display a given image (by index) for an exercise, with a graceful
        // fallback if the file hasn't been added to /images yet.
        function showImage(exercise, imgIndex) {
            const path = exercise.images[imgIndex] || exercise.images[0];
            DOM.imageFallback.classList.add('hidden');
            DOM.imageFallback.classList.remove('flex');
            DOM.exerciseImage.classList.remove('hidden');
            DOM.exerciseImage.style.opacity = 0;
            DOM.exerciseImage.alt = exercise.name;
            DOM.exerciseImage.src = path;
            requestAnimationFrame(() => { DOM.exerciseImage.style.opacity = 1; });
        }

        // Fallback shown if an image file is missing (e.g. not yet added to /images)
        function handleImageError(imgEl) {
            const path = imgEl.getAttribute('src');
            imgEl.classList.add('hidden');
            DOM.imageFallbackPath.textContent = path;
            DOM.imageFallback.classList.remove('hidden');
            DOM.imageFallback.classList.add('flex');
            lucide.createIcons({ root: DOM.imageFallback });
        }

        // Update UI based on current state
        function updateUI() {
            const currentEx = exercises[currentIndex];

            // Header
            DOM.progressText.textContent = `Exercise ${currentIndex + 1} of ${exercises.length}`;
            renderSegments();

            // Main Stage
            DOM.exerciseName.textContent = currentEx.name;
            DOM.timerDisplay.textContent = formatTime(timeLeft);

            // Show the current illustration image for this exercise
            showImage(currentEx, currentImageIndex);

            // Controls
            if (isPlaying) {
                DOM.playIcon.classList.add('hidden');
                DOM.pauseIcon.classList.remove('hidden');
            } else {
                DOM.playIcon.classList.remove('hidden');
                DOM.pauseIcon.classList.add('hidden');
            }

            // Up Next
            if (currentIndex < exercises.length - 1) {
                DOM.upNextSection.classList.remove('opacity-0', 'pointer-events-none');
                const nextEx = exercises[currentIndex + 1];
                DOM.nextName.textContent = nextEx.name;
                DOM.nextTime.textContent = formatTime(nextEx.duration);
            } else {
                DOM.upNextSection.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        // Play / Pause Logic
        function togglePlayPause() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                timerInterval = setInterval(tick, 1000);
            } else {
                clearInterval(timerInterval);
            }
            updateUI();
        }

        // Timer Tick
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                DOM.timerDisplay.textContent = formatTime(timeLeft);

                // Switch to the second image partway through, for exercises that have one
                const currentEx = exercises[currentIndex];
                if (currentEx.images.length > 1 && currentImageIndex === 0) {
                    const elapsed = currentEx.duration - timeLeft;
                    if (elapsed >= Math.ceil(currentEx.duration / 2)) {
                        currentImageIndex = 1;
                        showImage(currentEx, currentImageIndex);
                    }
                }
            } else {
                visualPing();
                nextExercise();
            }
        }

        // Subtle Visual Ping Effect
        function visualPing() {
            DOM.timerDisplay.classList.remove('pulse-once');
            void DOM.timerDisplay.offsetWidth;
            DOM.timerDisplay.classList.add('pulse-once');
        }

        // Skip to next exercise
        function skipExercise() {
            visualPing();
            nextExercise();
        }

        // Transition logic
        function nextExercise() {
            if (currentIndex < exercises.length - 1) {
                currentIndex++;
                timeLeft = exercises[currentIndex].duration;
                currentImageIndex = 0;
                updateUI();
            } else {
                showComplete();
            }
        }

        // Reset current timer
        function resetCurrent() {
            timeLeft = exercises[currentIndex].duration;
            currentImageIndex = 0;
            if (!isPlaying) {
                updateUI();
            } else {
                DOM.timerDisplay.textContent = formatTime(timeLeft);
                showImage(exercises[currentIndex], currentImageIndex);
            }
        }

        // Show Final Screen
        function showComplete() {
            clearInterval(timerInterval);
            isPlaying = false;

            DOM.activeView.classList.add('hidden');
            DOM.upNextSection.classList.add('hidden');
            document.querySelector('.app-header').classList.add('opacity-0');

            DOM.completeView.classList.remove('hidden');
            DOM.completeView.classList.add('flex');
        }

        // Restart entire session
        function restartSession() {
            currentIndex = 0;
            timeLeft = exercises[0].duration;
            currentImageIndex = 0;

            DOM.completeView.classList.add('hidden');
            DOM.completeView.classList.remove('flex');

            DOM.activeView.classList.remove('hidden');
            DOM.upNextSection.classList.remove('hidden');
            document.querySelector('.app-header').classList.remove('opacity-0');

            updateUI();
        }

        // Boot
        init();
    </script>
</body>
</html>
